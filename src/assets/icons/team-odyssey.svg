<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="30 10 50 120" fill="none">
  <!-- Rover -->
  <g fill="#FFFFFF">
    <!-- Wheels (Outer thick rings) -->
    <circle cx="28" cy="100" r="7.5" fill="transparent" stroke="#FFFFFF" stroke-width="5"/>
    <circle cx="56" cy="100" r="7.5" fill="transparent" stroke="#FFFFFF" stroke-width="5"/>
    <circle cx="90" cy="100" r="7.5" fill="transparent" stroke="#FFFFFF" stroke-width="5"/>
    <!-- Suspension / Struts -->
    <path d="M 28 92.5 L 39 78 M 56 92.5 L 39 78" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 85 92.5 L 72 78" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M 23 60               L 86 60               L 78 78               L 23 78               C 19 78, 17 76, 17 73               L 17 65               C 17 62, 19 60, 23 60 Z" fill="#FFFFFF"/>
    <!-- Left Appendage (Vertical stick with angled dish) -->
    <line x1="33" y1="60" x2="33" y2="46" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="27" y1="41" x2="36" y2="47" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Mast Assembly -->
    <!-- Base Box (narrowed further by 7.5%) -->
    <path d="M 64.5 60 L 64.5 55 Q 64.5 52 67.5 52 L 74.5 52 Q 77.5 52 77.5 55 L 77.5 60 Z" fill="#FFFFFF"/>
    <rect x="69.25" y="24" width="3.5" height="30" fill="#FFFFFF"/>
    <rect x="56.5" y="10" width="29" height="14" rx="3" fill="#FFFFFF"/>
  </g>
</svg>
